<style>
:root {
  --black: #020408;
  --deep: #06080f;
  --gold: #f0c040;
  --white: #f0f4ff;
  --gray: #7a8899;
  --border: rgba(240,192,64,0.1);
  --border2: rgba(240,192,64,0.22);
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--black);
  color: var(--white);
  font-family: 'Inter', sans-serif;
  overflow-x: hidden;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(240,192,64,0.018) 1px, transparent 1px),
    linear-gradient(90deg, rgba(240,192,64,0.018) 1px, transparent 1px);
  background-size: 80px 80px;
  pointer-events:none; z-index:0;
}

/* NAV */
    nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 60px;
    background: rgba(2,4,8,0.88);
    backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--border);
    gap: 40px;
  }
  .nav-logo-img {
    display: flex;
    align-items: center;
    text-decoration: none;
    flex-shrink: 0;
    max-width: 60%;
  }
  .nav-logo-img img {
    height: 72px;
    width: 100%; 
    max-width: 600px;
    object-fit: contain;
    object-position: left center;
    display: block;
    transition: opacity 0.3s;
    mix-blend-mode: lighten;
  }
  .nav-right {
    display: flex;
    align-items: center;
    gap: 40px;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .nav-links {
    display: flex;
    gap: 36px;
    list-style: none;
    margin: 0;
    padding: 0;
  }
  .nav-links a {
    color: var(--gray);
    text-decoration: none;
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    font-family: 'Space Mono', monospace;
    transition: color 0.3s;
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px; left: 0; right: 0;
    height: 1px;
    background: var(--cyan);
    transform: scaleX(0);
    transition: transform 0.3s;
  }
  .nav-links a:hover { color: var(--white); }
  .nav-links a:hover::after, .nav-links a.active::after { transform: scaleX(1); }
  .nav-links a.active { color: var(--white); }
  .nav-cta {
    background: transparent;
    border: 1px solid var(--cyan);
    color: var(--cyan);
    padding: 9px 22px;
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.3s;
    text-transform: uppercase;
    text-decoration: none;
    display: inline-block;
  }
  .nav-cta:hover { background: var(--cyan); color: var(--black); }

/* HERO */
.hero {
  min-height:100vh;
  display:flex; flex-direction:column; justify-content:center;
  padding:140px 60px 80px;
  position:relative; z-index:1;
  border-bottom:1px solid var(--border);
}

.hero-glow {
  position:absolute; top:0; right:-100px;
  width:700px; height:700px; border-radius:50%;
  background:radial-gradient(circle, rgba(240,192,64,0.04) 0%, transparent 65%);
  pointer-events:none;
}

.hero-inner {
  max-width:1200px; width:100%; margin:0 auto;
  display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:center;
}

.hero-eyebrow {
  font-family:'Space Mono',monospace; font-size:0.62rem;
  letter-spacing:3px; color:var(--gold); text-transform:uppercase;
  display:flex; align-items:center; gap:12px; margin-bottom:20px;
}
.hero-eyebrow::before { content:''; width:30px; height:1px; background:var(--gold); }

.hero h1 {
  font-family:'Syne',sans-serif; font-weight:800;
  line-height:1.0; margin-bottom:0;
}
.hero h1 em {
  font-style:normal; display:block;
  font-size:clamp(1rem,1.6vw,1.4rem);
  letter-spacing:3px; line-height:1.2;
  color:rgba(240,192,64,0.65); margin-bottom:10px;
  text-transform:uppercase; font-weight:700;
}
.hero h1 .sub-line {
  display:block;
  font-size:clamp(1.6rem,2.8vw,2.6rem);
  letter-spacing:-1px; line-height:1.1;
  color:var(--white);
}
.hero h1 .sub-line span { color:var(--gold); }

.hero-sub {
  font-family:'Space Mono',monospace; font-size:0.8rem;
  color:rgba(240,192,64,0.65); letter-spacing:1.5px; margin-top:18px; margin-bottom:18px;
}

.hero-desc {
  font-size:0.9rem; color:rgba(240,244,255,0.55);
  line-height:1.85; font-weight:300;
}

/* MANIFESTO COUNTERS */
.manifesto-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:1px;
  background:var(--border2); border:1px solid var(--border2);
}

.manifesto-card {
  background:var(--deep); padding:28px 24px;
  position:relative; overflow:hidden; transition:background 0.3s;
}
.manifesto-card:hover { background:rgba(240,192,64,0.04); }
.manifesto-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;

}
.manifesto-card:hover::before { transform:scaleX(1); }

.mc-num {

.mc-label {
  font-family:'Space Mono',monospace; font-size:0.6rem;

}

/* SECTIONS */
section { padding:80px 60px; position:relative; z-index:1; }
section.alt { background:rgba(240,192,64,0.01); border-top:1px solid var(--border); border-bottom:1px solid var(--border); }

.sec-eyebrow {
  font-family:'Space Mono',monospace; font-size:0.62rem;

.sec-title {

}
.sec-title span { color:var(--gold); }
.sec-sub { font-size:0.88rem; color:rgba(240,244,255,0.5); line-height:1.75; font-weight:300; max-width:620px; }

/* BUILDER */
.builder-grid {
  display:grid; grid-template-columns:1fr 1.8fr; gap:40px;

.builder-card {

}

.builder-initial {

}

.builder-title {

}

.builder-badges { display:flex; flex-direction:column; gap:9px; }
.badge {
  display:flex; align-items:center; gap:10px;
  background:rgba(0,0,0,0.25); border:1px solid rgba(255,255,255,0.06);
  padding:10px 14px; font-family:'Space Mono',monospace;
  font-size:0.67rem; letter-spacing:0.5px; color:rgba(240,244,255,0.7);
  transition:all 0.3s;
}
.badge:hover { border-color:rgba(240,192,64,0.3); color:var(--white); }
.badge-dot { width:6px; height:6px; border-radius:50%; background:var(--green); flex-shrink:0; }
.badge-dot.pending { background:var(--yellow); animation:pendingPulse 2s ease-in-out infinite; }
@keyframes pendingPulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

.builder-content { display:flex; flex-direction:column; gap:20px; }

.builder-block {
  border-left:2px solid rgba(240,192,64,0.18); padding:18px 22px;
  background:rgba(240,192,64,0.02); transition:all 0.3s;
}
.builder-block:hover {
  border-left-color:var(--gold);
  background:rgba(240,192,64,0.05);
}

.bb-label {
  font-family:'Space Mono',monospace; font-size:0.58rem;
  letter-spacing:2px; color:var(--gold); text-transform:uppercase;
  margin-bottom:6px;
}
.bb-title {
  font-family:'Syne',sans-serif; font-weight:700;
  font-size:0.95rem; color:var(--white); margin-bottom:7px;
}
.bb-desc { font-size:0.82rem; color:rgba(240,244,255,0.58); line-height:1.75; }
.bb-desc strong { color:var(--white); font-weight:500; }

.proof-bar {
  background:rgba(240,192,64,0.06); border:1px solid var(--border2);
  padding:20px 24px; display:flex; align-items:center; gap:18px;
}
.proof-icon { font-size:1.8rem; flex-shrink:0; }
.proof-text {
  font-family:'Syne',sans-serif; font-weight:700;
  font-size:0.95rem; color:var(--white); line-height:1.5;
}
.proof-text span { color:var(--gold); }
.proof-sub {
  font-size:0.72rem; color:var(--gray); margin-top:4px;
  font-family:'Space Mono',monospace; letter-spacing:0.5px;
}

/* OPPORTUNITY */
.opp-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:40px;
  margin-top:48px;
}

.market-frame {
  background:rgba(6,8,15,0.95); border:1px solid var(--border);
  padding:28px; margin-bottom:20px;
}
.mf-label {
  font-family:'Space Mono',monospace; font-size:0.58rem;
  color:var(--gold); letter-spacing:2px; text-transform:uppercase;
  margin-bottom:14px; display:flex; align-items:center; gap:8px;
}
.mf-label::after { content:''; flex:1; height:1px; background:rgba(240,192,64,0.15); }

.mf-item {
  display:flex; justify-content:space-between; align-items:baseline;

}
.mf-item:last-child { border-bottom:none; }
.mf-key { color:var(--gray); }
.mf-val { color:var(--white); }
.mf-val.gold { color:var(--gold); }
.mf-val.green { color:var(--green); }
.mf-val.red { color:var(--red); }

.gap-statement {
  background:rgba(240,192,64,0.04); border:1px solid var(--border2);
  padding:18px 22px;
}
.gap-title {
  font-family:'Syne',sans-serif; font-weight:700;
  font-size:0.88rem; color:var(--gold); margin-bottom:7px;
}
.gap-desc { font-size:0.81rem; color:rgba(240,244,255,0.58); line-height:1.7; }

.products-stack { display:flex; flex-direction:column; gap:10px; }

.product-card {
  background:var(--deep); border:1px solid rgba(240,192,64,0.13);

}
.product-card:hover { border-color:var(--gold); background:rgba(240,192,64,0.04); }

.product-num {
  font-family:'Syne',sans-serif; font-weight:800; font-size:2.2rem;

}
.product-card:hover .product-num { color:rgba(240,192,64,0.3); }

.product-name {
  font-family:'Syne',sans-serif; font-weight:700;
  font-size:0.95rem; color:var(--white); margin-bottom:5px;
}
.product-desc { font-size:0.79rem; color:var(--gray); line-height:1.5; }

.product-status {
  font-family:'Space Mono',monospace; font-size:0.56rem;
  letter-spacing:1.5px; padding:4px 9px; text-transform:uppercase; white-space:nowrap;
}
.status-live { color:var(--green); background:rgba(74,222,128,0.08); border:1px solid rgba(74,222,128,0.22); }
.status-dev { color:var(--yellow); background:rgba(251,191,36,0.08); border:1px solid rgba(251,191,36,0.22); }
.status-rd { color:var(--gray); background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); }

/* ASK */
.ask-grid {
  display:grid; grid-template-columns:repeat(2,1fr);
  gap:1px; background:var(--border); border:1px solid var(--border);
  margin-top:48px;
}

.ask-card {
  background:var(--deep); padding:32px 28px;
  position:relative; overflow:hidden; transition:background 0.3s;
}
.ask-card:hover { background:rgba(240,192,64,0.03); }
.ask-card::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background:var(--gold); transform:scaleX(0); transition:transform 0.4s;
}
.ask-card:hover::before { transform:scaleX(1); }

.ask-icon { font-size:1.5rem; display:block; margin-bottom:14px; }
.ask-title {
  font-family:'Syne',sans-serif; font-weight:700;

.ask-points { margin-top:12px; display:flex; flex-direction:column; gap:6px; }
.ask-point {
  font-family:'Space Mono',monospace; font-size:0.61rem;
  color:rgba(240,244,255,0.5); display:flex; align-items:center; gap:8px;
}
.ask-point::before { content:'→'; color:var(--gold); flex-shrink:0; }

/* CONTACT */
.contact-section {
  padding:70px 60px; position:relative; z-index:1;
  border-top:1px solid var(--border);
}

.contact-inner {
  max-width:1200px; margin:0 auto;
  display:flex; justify-content:space-between; align-items:center; gap:40px;
}

.contact-title {
  font-family:'Syne',sans-serif; font-weight:800;
  font-size:clamp(1.6rem,2.5vw,2.1rem); margin-bottom:8px;
}
.contact-title span { color:var(--gold); }
.contact-sub {

  color:var(--gray); letter-spacing:0.5px;

<script>
function countUp(el) {
  const target = parseInt(el.dataset.target);
  const suffix = el.dataset.suffix || '';
  if (target === 0) { el.textContent = '0'; return; }
  const steps = 60;
  const interval = 1800 / steps;
  const increment = Math.ceil(target / steps);
  let current = 0;
  el.textContent = '0' + suffix;
  const timer = setInterval(() => {
    current += increment;
    if (current >= target) { current = target; clearInterval(timer); }
    el.textContent = current + suffix;
  }, interval);
}
window.addEventListener('load', () => {
  setTimeout(() => {
    document.querySelectorAll('.mc-num[data-target]').forEach(el => countUp(el));
  }, 400);
});
</script>
